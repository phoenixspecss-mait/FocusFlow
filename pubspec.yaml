name: FocusFlow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.3.10
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  youtube_player_flutter: ^9.1.1
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0
  test: ^1.26.2

flutter_launcher_icons:
  android: true
  ios: true
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/images/ic_launcher_foreground.png"
  image_path: "assets/images/ic_launcher_foreground.png"

flutter:
  uses-material-design: true
  fonts:
    - family: medifont
      fonts:
        - asset: assets/fonts/Outfit-VariableFont_wght.ttf
    - family: medifont2
      fonts:
        - asset: assets/fonts/BBHHegarty-Regular.ttf
  assets:
    - assets/images/